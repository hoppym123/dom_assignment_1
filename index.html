<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Profile card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="mainbody">
     

    <div class="container">
        <div class = "greeting" id = "greeting" ></div>
            <h1>Traceworka Student <br>Profile Card</h1>
        

        <div class="card">
            <div class="field">
                <label for="nameInput">Full Name</label>
                <input type="text" id="nameInput" placeholder="e.g Afeez">
                <div class="error-msg" id="nameError">Please Enter Your Name</div>
            </div>


            <div class="field">
                <label for="nameInput">Age</label>
                <input type="number" id="ageInput" placeholder="e.g 18">
                <div class="error-msg" id="ageError">Please Enter Your Age</div>
            </div>

            <div class="field">
                <label for="colorInput">Favourite Color</label>
                <select name="colorInput" id="colorInput">
                    <option value="">Select a color</option>
                    <option value="red">Red</option>
                    <option value="blue">Blue</option>
                    <option value="green">Green</option>
                    <option value="yellow">Yellow</option>
                    <option value="purple">Purple</option>
                    <option value="orange">Orange</option>
                    <option value="pink">Pink</option>
                    <option value="black">Black</option>
                    <option value="white">White</option>
                    <option value="gray">Gray</option>
                </select>
                </div>
                <div class="btn">
                    <button class="btn-generate" onclick="generateProfile()">Generate Profile</button>
                    <button class="btn-reset" onclick="resetForm()">Reset</button>
                </div>

                <div class="profile-output" id="profileOutput">
                    <p id="profileSentence"></p>
                </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
